name: Deploy hub to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the deploy job to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Let a newer push supersede an in-progress run, but don't cancel a
# deploy already in flight.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build _site
        run: node scripts/build.js

      # ImageMagick ships on the runner; rasterize the single SVG source into
      # the PNG sizes iOS and the manifest need. The repo stores only icon.svg.
      - name: Rasterize PWA icons
        run: |
          convert -background none icon.svg -resize 180x180 _site/apple-touch-icon.png
          convert -background none icon.svg -resize 192x192 _site/icon-192.png
          convert -background none icon.svg -resize 512x512 _site/icon-512.png

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
