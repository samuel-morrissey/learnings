# Settings for Backend (on Cloud Run).
# See https://firebase.google.com/docs/app-hosting/configure#cloud-run
runConfig:
  minInstances: 0
  # maxInstances: 100
  # concurrency: 80
  # cpu: 1
  # memoryMiB: 512

# Environment variables and secrets.
env:
  # The @astrojs/node standalone server binds to process.env.HOST (default
  # `localhost`). On Cloud Run that fails the startup TCP probe with
  # DEADLINE_EXCEEDED, since the probe can't reach a loopback-only bind.
  # Binding to 0.0.0.0 lets the probe and real traffic reach it on PORT=8080.
  - variable: HOST
    value: "0.0.0.0"
    availability:
      - RUNTIME

  # Configure environment variables.
  # See https://firebase.google.com/docs/app-hosting/configure#user-defined-environment
  # - variable: MESSAGE
  #   value: Hello world!
  #   availability:
  #     - BUILD
  #     - RUNTIME

  # Grant access to secrets in Cloud Secret Manager.
  # You can create secrets with the CLI command `firebase apphosting:secrets:set <secretName>`.
  # See https://firebase.google.com/docs/app-hosting/configure#secret-parameters
  # - variable: MY_SECRET
  #   secret: mySecretRef
